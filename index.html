<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Michal Husťák — Product & Business Analyst" />
  <title>Michal Husťák</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #111;
      --text:   #ccc8be;
      --muted:  #444;
      --accent: #a8e8bc;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem 1.25rem;
      gap: 0;
    }

    /* ── IMAGE ── */
    .meme {
      width: 100%;
      max-width: 480px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow:
        0 2px 8px rgba(0,0,0,.4),
        0 12px 40px rgba(0,0,0,.6),
        0 0 0 1px rgba(255,255,255,.04);
      animation: rise .6s cubic-bezier(.22,1,.36,1) both;
    }

    .meme img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── NAME ── */
    .name {
      margin-top: 1.8rem;
      font-size: clamp(.8rem, 3.5vw, .95rem);
      font-weight: 400;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      animation: rise .6s cubic-bezier(.22,1,.36,1) .1s both;
    }

    /* ── LINKS ── */
    .links {
      margin-top: 1.2rem;
      display: flex;
      gap: .7rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: rise .6s cubic-bezier(.22,1,.36,1) .2s both;
    }

    a.lnk {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      font-family: var(--mono);
      font-size: .72rem;
      font-weight: 400;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #555;
      text-decoration: none;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 0 1.1rem;
      height: 44px; /* touch target */
      min-width: 120px;
      transition: color .2s, border-color .2s, background .2s;
      -webkit-tap-highlight-color: transparent;
    }

    a.lnk:hover, a.lnk:focus-visible {
      color: var(--accent);
      border-color: #2d5a3d;
      background: rgba(168,232,188,.04);
      outline: none;
    }

    a.lnk:active {
      background: rgba(168,232,188,.08);
    }

    a.lnk svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .foot {
      margin-top: 2.5rem;
      font-size: .6rem;
      letter-spacing: .1em;
      color: #252525;
      animation: rise .6s cubic-bezier(.22,1,.36,1) .3s both;
    }

    /* ── ANIMATION ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
